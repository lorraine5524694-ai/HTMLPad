<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- 主背景:苹果浅蓝渐变 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5AC8FA"/>
      <stop offset="50%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#0051D5"/>
    </linearGradient>
    <!-- 内层卡片:略带毛玻璃感的浅色 -->
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#F5F5F7" stop-opacity="0.95"/>
    </linearGradient>
    <!-- </> 字符的渐变 -->
    <linearGradient id="brackets" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>
    <!-- 卡片阴影 -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000" flood-opacity="0.16"/>
    </filter>
    <!-- 顶部高光 -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 圆角矩形背景(macOS squircle 风格,半径约 22.4%) -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- 顶部高光层 -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#highlight)"/>

  <!-- 中央"文档卡片",带阴影 -->
  <g filter="url(#cardShadow)">
    <rect x="180" y="200" width="664" height="624" rx="56" ry="56" fill="url(#card)"/>
  </g>

  <!-- 文档顶部三个小圆点(macOS 窗口控制按钮风格) -->
  <circle cx="232" cy="262" r="13" fill="#FF5F57"/>
  <circle cx="272" cy="262" r="13" fill="#FEBC2E"/>
  <circle cx="312" cy="262" r="13" fill="#28C840"/>

  <!-- 顶部分隔线 -->
  <line x1="180" y1="312" x2="844" y2="312" stroke="#E5E5EA" stroke-width="2"/>

  <!-- 中央 </> 符号 -->
  <g fill="none" stroke="url(#brackets)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round">
    <!-- 左尖括号 < -->
    <polyline points="395,460 305,560 395,660"/>
    <!-- 右尖括号 > -->
    <polyline points="629,460 719,560 629,660"/>
    <!-- 中间斜线 / -->
    <line x1="555" y1="430" x2="470" y2="690"/>
  </g>

  <!-- 底部小色块:象征三种设备预览(对应 phone/tablet/desktop) -->
  <g>
    <rect x="362" y="744" width="22" height="32" rx="4" ry="4" fill="#34C759" opacity="0.85"/>
    <rect x="396" y="738" width="40" height="38" rx="5" ry="5" fill="#FF9F0A" opacity="0.85"/>
    <rect x="448" y="730" width="62" height="46" rx="6" ry="6" fill="#AF52DE" opacity="0.85"/>
    <rect x="522" y="738" width="40" height="38" rx="5" ry="5" fill="#FF375F" opacity="0.85"/>
    <rect x="574" y="744" width="22" height="32" rx="4" ry="4" fill="#5AC8FA" opacity="0.85"/>
  </g>
</svg>
